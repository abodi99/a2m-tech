<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#176BE0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#004869" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#176BE0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#004869" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background panel -->
  <rect width="480" height="400" rx="24" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g stroke="#004869" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="160" x2="480" y2="160"/>
    <line x1="0" y1="240" x2="480" y2="240"/>
    <line x1="0" y1="320" x2="480" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
  </g>

  <!-- Central shield -->
  <path d="M240 60 L320 100 V200 C320 260 280 310 240 330 C200 310 160 260 160 200 V100 Z"
        fill="#004869" fill-opacity="0.12" stroke="#004869" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Shield checkmark -->
  <path d="M210 200 L230 225 L275 175" stroke="#176BE0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Network nodes -->
  <circle cx="100" cy="120" r="8" fill="#176BE0" fill-opacity="0.7"/>
  <circle cx="380" cy="120" r="8" fill="#176BE0" fill-opacity="0.7"/>
  <circle cx="80" cy="280" r="6" fill="#004869" fill-opacity="0.5"/>
  <circle cx="400" cy="280" r="6" fill="#004869" fill-opacity="0.5"/>
  <circle cx="240" cy="370" r="7" fill="#176BE0" fill-opacity="0.6"/>

  <!-- Connection lines -->
  <g stroke="url(#lineGrad)" stroke-width="1.5" stroke-opacity="0.5">
    <line x1="100" y1="120" x2="160" y2="100"/>
    <line x1="380" y1="120" x2="320" y2="100"/>
    <line x1="100" y1="120" x2="80" y2="280"/>
    <line x1="380" y1="120" x2="400" y2="280"/>
    <line x1="80" y1="280" x2="240" y2="370"/>
    <line x1="400" y1="280" x2="240" y2="370"/>
    <line x1="160" y1="200" x2="100" y2="120"/>
    <line x1="320" y1="200" x2="380" y2="120"/>
  </g>

  <!-- Data flow arcs -->
  <path d="M120 180 Q180 140 240 160" stroke="#176BE0" stroke-width="1.5" stroke-opacity="0.4" fill="none" stroke-dasharray="4 4"/>
  <path d="M360 180 Q300 140 240 160" stroke="#176BE0" stroke-width="1.5" stroke-opacity="0.4" fill="none" stroke-dasharray="4 4"/>

  <!-- Small accent dots -->
  <circle cx="180" cy="160" r="3" fill="#176BE0" fill-opacity="0.8"/>
  <circle cx="300" cy="160" r="3" fill="#176BE0" fill-opacity="0.8"/>
  <circle cx="240" cy="240" r="4" fill="#004869" fill-opacity="0.6"/>
</svg>
